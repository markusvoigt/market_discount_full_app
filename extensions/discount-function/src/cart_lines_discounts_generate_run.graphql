query CartLineDiscountInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
        compareAtAmountPerQuantity {
          amount
        }
      }
    }
  }
  localization {
    country {
      isoCode
    }
    language {
      isoCode
    }
    market {
      id
    }
  }
  discount {
    discountClasses
    configuration: metafield(
      namespace: "$app:discount-function"
      key: "function-configuration"
    ) {
      value
    }
  }
  shop {
    localTime {
      date
    }
  }
}
