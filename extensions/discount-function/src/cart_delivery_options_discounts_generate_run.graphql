query Input {
  cart {
    deliveryGroups {
      id
      deliveryOptions {
        handle
        title
        cost {
          amount
          currencyCode
        }
      }
    }
  }
  discount {
    discountClasses
    configuration: metafield(
      namespace: "$app:discount-function"
      key: "function-configuration"
    ) {
      value
    }
  }
  localization {
    country {
      isoCode
    }
    market {
      id
    }
  }
  shop {
    localTime {
      date
    }
  }
}
